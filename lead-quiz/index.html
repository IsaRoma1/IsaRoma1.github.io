<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" />
    <meta name="description" content="Короткий тест, который определит подходящий формат лид-квиза для вашего бизнеса." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:title" content="Какой лид-квиз подойдёт вашему бизнесу?" />
    <meta property="og:description" content="8 вопросов — и готовая механика, структура результата, дизайн и сценарий воронки." />
    <meta property="og:url" content="https://ii41.ru/lead-quiz/" />
    <meta property="og:image" content="https://ii41.ru/lead-quiz/assets/robot-emotions/robot-joy.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Какой лид-квиз подойдёт вашему бизнесу?</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-atmosphere" aria-hidden="true">
      <span class="orb orb-one"></span>
      <span class="orb orb-two"></span>
      <span class="grid-glow"></span>
    </div>

    <header class="site-header">
      <a class="brand" href="./" aria-label="Начать квиз заново">
        <span class="brand-gem" aria-hidden="true">✦</span>
        <span>ЛИД-КВИЗ</span>
      </a>
      <span class="header-note">Персональная механика · 2 минуты</span>
    </header>

    <main id="app" tabindex="-1"></main>

    <aside class="robot-companion" aria-label="Летающий робот-проводник">
      <span class="robot-orbit" aria-hidden="true"></span>
      <img id="robot-expression" src="./assets/robot-emotions/robot-joy.png" alt="Радостный белый робот-проводник" />
      <span class="robot-blink" aria-hidden="true"></span>
      <span class="robot-status"><i></i><b>Ева радуется</b></span>
    </aside>

    <noscript>Для прохождения квиза включите JavaScript в браузере.</noscript>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
